name: Code validation

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  frontend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Restore cached dependencies
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: ./src/AKCore/node_modules
          key: npm-${{ hashFiles('./src/AKCore/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          cd src/AKCore
          npm ci --ignore-scripts

      - name: Lint
        run: |
          cd src/AKCore
          npm run lint

      - name: Typecheck
        run: |
          cd src/AKCore
          npm run typecheck

      - name: Component tests
        run: |
          cd src/AKCore
          timeout 2m npm run test:components

  backend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Integration tests
        run: dotnet test tests/AKCore.IntegrationTests/AKCore.IntegrationTests.csproj --configuration Release 
