name: Code validation

on:
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  frontend-validation:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Restore cached dependencies
        id: cache-restore
        uses: actions/cache@v4
        with:
          path: ./src/AKCore/node_modules
          key: npm-${{ hashFiles('./src/AKCore/package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-restore.outputs.cache-hit != 'true'
        run: |
          cd src/AKCore
          npm ci --ignore-scripts

      # - name: Lint
      #   run: |
      #     cd src/AKCore
      #     npm run lint

      # - name: Typecheck
      #   run: |
      #     cd src/AKCore
      #     npm run typecheck

      - name: Get Playwright version
        id: playwright-version
        working-directory: src/AKCore
        run: echo "version=$(node -p "require('./node_modules/playwright/package.json').version")" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: src/AKCore
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium
        working-directory: src/AKCore
        run: npx playwright install chromium

      - name: Component tests
        working-directory: src/AKCore
        run: npx vitest run --project=component-tests

